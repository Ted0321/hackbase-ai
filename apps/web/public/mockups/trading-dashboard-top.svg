<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">AI投資会議ダッシュボード トップ画面モックアップ</title>
  <desc id="desc">銘柄、期間、分析深度を入力してAI分析を開始するトップ画面のUIモックアップ。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#00d9bd"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="#f4f6f8"/>
  <rect x="70" y="56" width="1300" height="788" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="70" y="56" width="1300" height="92" rx="18" fill="#171718"/>
  <rect x="70" y="128" width="1300" height="20" fill="#171718"/>
  <text x="112" y="114" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="800">AI投資会議ダッシュボード</text>
  <text x="1088" y="112" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="18">Research mock</text>
  <circle cx="1286" cy="104" r="18" fill="#00d9bd"/>
  <text x="1280" y="111" fill="#111112" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">AI</text>

  <text x="112" y="220" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="850">銘柄を入れて、AI会議を開始する</text>
  <text x="112" y="260" fill="#5f6b78" font-family="Inter, Arial, sans-serif" font-size="21">財務、ニュース、センチメント、テクニカル、リスクの観点を分けて調査します。</text>

  <rect x="112" y="310" width="1216" height="150" rx="14" fill="#f8fafc" stroke="#d7dce2"/>
  <text x="144" y="354" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850">銘柄セット</text>
  <rect x="144" y="378" width="340" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="166" y="410" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="750">7203 / TSLA / NVDA</text>
  <rect x="514" y="378" width="252" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="536" y="410" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19">期間: 1週間</text>
  <rect x="796" y="378" width="252" height="50" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="818" y="410" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="19">深度: standard</text>
  <rect x="1080" y="374" width="208" height="58" rx="9" fill="url(#accent)"/>
  <text x="1128" y="410" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">分析を開始</text>

  <g transform="translate(112 508)">
    <rect width="278" height="170" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="22" y="42" fill="#ea580c" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">市場データ</text>
    <text x="22" y="82" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">出来高 +18%</text>
    <text x="22" y="122" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="17">価格とボラティリティを確認</text>
  </g>
  <g transform="translate(424 508)">
    <rect width="278" height="170" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="22" y="42" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">ニュース</text>
    <text x="22" y="82" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">材料 6件</text>
    <text x="22" y="122" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="17">直近ニュースを要約</text>
  </g>
  <g transform="translate(736 508)">
    <rect width="278" height="170" rx="12" fill="#f0fdfa" stroke="#99f6e4"/>
    <text x="22" y="42" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">SNS</text>
    <text x="22" y="82" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">中立寄り</text>
    <text x="22" y="122" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="17">過熱感と反応量を見る</text>
  </g>
  <g transform="translate(1048 508)">
    <rect width="278" height="170" rx="12" fill="#f8fafc" stroke="#d7dce2"/>
    <text x="22" y="42" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="850">企業情報</text>
    <text x="22" y="82" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="850">確認待ち</text>
    <text x="22" y="122" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="17">決算と開示を追加予定</text>
  </g>

  <rect x="112" y="724" width="1216" height="62" rx="12" fill="#171718"/>
  <circle cx="150" cy="755" r="7" fill="#00d9bd"/>
  <text x="172" y="762" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">次の画面でAI会議が始まります</text>
  <text x="1064" y="762" fill="#9ca3af" font-family="Inter, Arial, sans-serif" font-size="17">Decision memo, not investment advice</text>
</svg>
