<svg width="1000" height="520" viewBox="0 0 1000 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hackbase.ai システム構成</title>
<desc>外部シグナルをCloud SQLに取り込み、Cloud SchedulerがCloud Run JobsのAI生成パイプラインを起動、Gemini APIを呼び出して成果物をCloud SQL/Cloud Storageに保存し、Cloud RunのNext.jsアプリで公開・観測する構成。</desc>
<defs>
<marker id="arw" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text{font-family:'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif}
.ttl{font-size:19px;font-weight:600}
.sub{font-size:11px}
.leg{font-size:10px}
.gcp{font-size:12px;font-weight:500}
.bt{font-size:13px;font-weight:600}
.bs{font-size:10px}
.lbl{font-size:10px}
.foot{font-size:10px}
</style>

<rect x="0" y="0" width="1000" height="520" fill="#FAFAF6"/>

<!-- header -->
<text class="ttl" x="28" y="42" fill="#2C2C2A">Hackbase.ai システム構成</text>
<text class="sub" x="29" y="64" fill="#6E6E68">外部情報の収集 → AIエージェントが生成 → Cloud Run で公開・観測</text>

<!-- legend -->
<rect x="590" y="30" width="12" height="12" rx="2.5" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/><text class="leg" x="607" y="40" fill="#6E6E68">データ層</text>
<rect x="672" y="30" width="12" height="12" rx="2.5" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/><text class="leg" x="689" y="40" fill="#6E6E68">実行基盤</text>
<rect x="754" y="30" width="12" height="12" rx="2.5" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/><text class="leg" x="771" y="40" fill="#6E6E68">生成AI</text>
<rect x="822" y="30" width="12" height="12" rx="2.5" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/><text class="leg" x="839" y="40" fill="#6E6E68">外部・人間</text>

<!-- GCP container -->
<rect x="305" y="104" width="575" height="388" rx="12" fill="none" stroke="#A9A79E" stroke-width="1" stroke-dasharray="5 4"/>
<g transform="translate(322,118)"><path d="M2 8 a4 4 0 0 1 1 -7.6 a5 5 0 0 1 9.4 1 a3.4 3.4 0 0 1 -0.4 6.6 z" fill="#EDEBE4" stroke="#A9A79E" stroke-width="0.8"/></g>
<text class="gcp" x="342" y="126" fill="#6E6E68">Google Cloud Platform</text>

<!-- ================= edges ================= -->
<!-- external -> cloud sql : 収集 -->
<path d="M280 232 L343 198" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="304" y="209" fill="#6E6E68" text-anchor="middle">収集</text>
<!-- cloud sql <-> cloud run jobs : 保存 -->
<path d="M561 182 L598 178" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<path d="M598 206 L561 210" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="579" y="230" fill="#6E6E68" text-anchor="middle">保存</text>
<!-- cloud sql -> cloud storage : アセット -->
<path d="M452 232 L452 260" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="476" y="251" fill="#6E6E68">アセット</text>
<!-- cloud run jobs <-> gemini : 生成 -->
<path d="M838 182 L894 186" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<path d="M894 202 L838 206" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="866" y="172" fill="#6E6E68" text-anchor="middle">生成</text>
<!-- scheduler -> cloud run jobs (up) -->
<path d="M714 260 L714 230" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<!-- cloud storage -> cloud run web : 配信 -->
<path d="M500 330 L606 380" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="544" y="346" fill="#6E6E68" text-anchor="middle">配信</text>
<!-- cloud run web -> human : 観測/操作 -->
<path d="M598 412 L280 416" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>
<text class="lbl" x="432" y="405" fill="#6E6E68" text-anchor="middle">観測 / 操作</text>
<!-- ci/cd -> cloud run web (up) -->
<path d="M722 454 L722 446" fill="none" stroke="#9A9A93" stroke-width="1.1" marker-end="url(#arw)"/>

<!-- ================= external signals ================= -->
<rect x="28" y="150" width="250" height="196" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<text class="bt" x="153" y="180" fill="#444441" text-anchor="middle">外部シグナル</text>
<!-- github -->
<g transform="translate(46,200)" fill="#57564F"><path d="M9 0.4a9 9 0 0 0 -2.8 17.5c0.45 0.08 0.6 -0.2 0.6 -0.43v-1.5c-2.5 0.55 -3 -1.2 -3 -1.2 -0.4 -1 -1 -1.3 -1 -1.3 -0.8 -0.56 0.06 -0.55 0.06 -0.55 0.9 0.06 1.4 0.93 1.4 0.93 0.8 1.4 2.1 1 2.6 0.76 0.08 -0.6 0.32 -1 0.58 -1.24 -2 -0.23 -4.1 -1 -4.1 -4.5 0 -1 0.36 -1.8 0.94 -2.44 -0.1 -0.23 -0.4 -1.16 0.1 -2.42 0 0 0.77 -0.25 2.52 0.93a8.7 8.7 0 0 1 4.6 0c1.74 -1.18 2.5 -0.93 2.5 -0.93 0.5 1.26 0.19 2.19 0.09 2.42 0.59 0.64 0.94 1.45 0.94 2.44 0 3.5 -2.13 4.27 -4.16 4.5 0.33 0.28 0.62 0.84 0.62 1.7v2.5c0 0.24 0.16 0.52 0.62 0.43A9 9 0 0 0 9 0.4"/></g>
<text class="bs" x="72" y="215" fill="#5F5E5A">GitHub</text>
<!-- window / product sites -->
<g transform="translate(46,238)" fill="none" stroke="#57564F" stroke-width="1.4"><rect x="0" y="1" width="18" height="14" rx="2"/><path d="M0 6 H18" stroke-width="1.2"/><circle cx="3.2" cy="3.5" r="0.8" fill="#57564F" stroke="none"/><circle cx="6" cy="3.5" r="0.8" fill="#57564F" stroke="none"/></g>
<text class="bs" x="72" y="253" fill="#5F5E5A">先行事例のプロダクト紹介サイト</text>
<!-- doc / tech info -->
<g transform="translate(48,276)" fill="none" stroke="#57564F" stroke-width="1.4"><path d="M1 0 h10 l4 4 v14 h-14 z"/><path d="M11 0 v4 h4" stroke-width="1.2"/><path d="M4 9 H12 M4 12.5 H12" stroke-width="1.1"/></g>
<text class="bs" x="72" y="291" fill="#5F5E5A">AI各社の技術情報</text>

<!-- ================= human ================= -->
<rect x="28" y="372" width="250" height="76" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<g transform="translate(48,394)" fill="#57564F"><circle cx="8" cy="6" r="5"/><path d="M0 22 a8 8.5 0 0 1 16 0 z"/></g>
<text class="bt" x="80" y="406" fill="#444441">人間</text>
<text class="bs" x="153" y="432" fill="#5F5E5A" text-anchor="middle">閲覧・承認 / 保留 / 停止</text>

<!-- ================= cloud sql ================= -->
<rect x="345" y="158" width="216" height="72" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<g transform="translate(363,180)" fill="none" stroke="#0F6E56" stroke-width="1.4"><ellipse cx="9" cy="3" rx="8" ry="3"/><path d="M1 3 v13 a8 3 0 0 0 16 0 v-13"/><path d="M1 9.5 a8 3 0 0 0 16 0" stroke-width="1.1"/></g>
<text class="bt" x="392" y="192" fill="#085041">Cloud SQL</text>
<text class="bs" x="392" y="210" fill="#0F6E56">データ層 / 成果物</text>

<!-- ================= cloud storage ================= -->
<rect x="345" y="262" width="216" height="66" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<g transform="translate(363,282)" fill="none" stroke="#0F6E56" stroke-width="1.4"><path d="M0 1 h18 l-1.6 18 a1 1 0 0 1 -1 0.9 h-12.8 a1 1 0 0 1 -1 -0.9 z"/><path d="M0.7 6 H17.3" stroke-width="1.1"/></g>
<text class="bt" x="392" y="294" fill="#085041">Cloud Storage</text>
<text class="bs" x="392" y="312" fill="#0F6E56">成果物アセット</text>

