<rect x="600" y="150" width="238" height="78" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<g transform="translate(618,175)"><rect x="0" y="0" width="20" height="20" rx="4" fill="none" stroke="#534AB7" stroke-width="1.4"/><path d="M7 5.5 L14.5 10 L7 14.5 Z" fill="#534AB7"/></g>
<text class="bt" x="648" y="186" fill="#3C3489">Cloud Run Jobs</text>
<text class="bs" x="648" y="205" fill="#534AB7">AI生成パイプライン</text>

<!-- ================= cloud scheduler ================= -->
<rect x="600" y="262" width="216" height="66" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<g transform="translate(618,283)" fill="none" stroke="#534AB7" stroke-width="1.4"><circle cx="10" cy="10" r="9"/><path d="M10 4.5 V10 L14 12.5" stroke-linecap="round"/></g>
<text class="bt" x="648" y="294" fill="#3C3489">Cloud Scheduler</text>
<text class="bs" x="648" y="312" fill="#534AB7">定期起動</text>

<!-- ================= cloud run / next.js ================= -->
<rect x="600" y="372" width="240" height="74" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<g transform="translate(618,395)"><circle cx="10" cy="10" r="10" fill="#1C1B22"/><path d="M6 15 V5 L15 15.5 M14 5 V13.5" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/></g>
<text class="bt" x="648" y="406" fill="#3C3489">Cloud Run / Next.js</text>
<text class="bs" x="648" y="424" fill="#534AB7">公開・観測アプリ</text>

