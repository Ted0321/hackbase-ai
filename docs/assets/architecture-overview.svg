<rect x="896" y="158" width="94" height="78" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<g transform="translate(936,172)" fill="#993C1D"><path d="M6 0 C6.5 3.4 8.6 5.5 12 6 C8.6 6.5 6.5 8.6 6 12 C5.5 8.6 3.4 6.5 0 6 C3.4 5.5 5.5 3.4 6 0 Z"/></g>
<text class="bt" x="943" y="200" fill="#712B13" text-anchor="middle">Gemini API</text>
