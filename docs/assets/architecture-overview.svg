<rect x="345" y="456" width="491" height="30" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
<g transform="translate(360,463)" fill="none" stroke="#57564F" stroke-width="1.4"><circle cx="2.5" cy="2.5" r="2.3"/><circle cx="2.5" cy="13.5" r="2.3"/><circle cx="13" cy="5" r="2.3"/><path d="M2.5 4.8 V11.2" /><path d="M2.5 8 a10 10 0 0 1 10 -3" /></g>
<text class="bs" x="386" y="475" fill="#444441">CI/CD ― GitHub Actions / Cloud Build / Artifact Registry</text>

