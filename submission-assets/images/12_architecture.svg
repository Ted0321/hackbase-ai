<svg width="680" height="376" viewBox="0 0 680 376" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Hackbase.ai システム構成</title>
<desc>外部シグナルをCloud SQLに取り込み、Cloud SchedulerがCloud Run JobsのAI生成パイプラインを起動、Gemini APIを呼び出して成果物をCloud SQL/Cloud Storageに保存し、Cloud Run上のNext.jsアプリで公開・観測する構成。</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<style>
text{font-family:'Yu Gothic UI','Yu Gothic','Meiryo','Noto Sans JP','Hiragino Kaku Gothic ProN',sans-serif}
.title{font-size:16px;font-weight:600}
.sub{font-size:10px}
.leg{font-size:9px}
.gcp{font-size:11px;font-weight:500}
.bt{font-size:12px;font-weight:500}
.bs{font-size:9.5px}
.lbl{font-size:9px}
.foot{font-size:9px}
</style>

<rect x="0" y="0" width="680" height="376" fill="#FAFAF6"/>

<text class="title" x="16" y="26" fill="#2C2C2A">Hackbase.ai システム構成</text>
<text class="sub" x="16" y="44" fill="#6E6E68">外部情報の収集 → AIエージェントが生成 → Cloud Run で公開・観測</text>

<!-- legend -->
<rect x="392" y="17" width="11" height="11" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/><text class="leg" x="407" y="26" fill="#6E6E68">データ層</text>
<rect x="452" y="17" width="11" height="11" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/><text class="leg" x="467" y="26" fill="#6E6E68">実行基盤</text>
<rect x="516" y="17" width="11" height="11" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/><text class="leg" x="531" y="26" fill="#6E6E68">生成AI</text>
<rect x="572" y="17" width="11" height="11" rx="2" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/><text class="leg" x="587" y="26" fill="#6E6E68">外部・人間</text>

<!-- GCP container -->
<rect x="150" y="58" width="412" height="288" rx="10" fill="none" stroke="#A9A79E" stroke-width="0.9" stroke-dasharray="4 3"/>
<text class="gcp" x="160" y="76" fill="#6E6E68">Google Cloud Platform</text>

<!-- edges -->
<path d="M138 150 L170 134" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="150" y="128" fill="#6E6E68" text-anchor="middle">収集</text>
<path d="M324 124 L360 116" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M435 172 L435 150" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M532 112 L582 112" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="558" y="104" fill="#6E6E68" text-anchor="middle">生成呼び出し</text>
<path d="M584 130 L534 130" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M360 142 L326 148" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="345" y="166" fill="#6E6E68" text-anchor="middle">保存</text>
<path d="M248 158 L248 174" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="266" y="170" fill="#6E6E68">アセット</text>
<path d="M324 206 L358 250" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="330" y="236" fill="#6E6E68" text-anchor="middle">配信</text>
<path d="M451 312 L451 304" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<path d="M360 276 L140 276" fill="none" stroke="#9A9A93" stroke-width="1" marker-end="url(#arrow)"/>
<text class="lbl" x="250" y="269" fill="#6E6E68" text-anchor="middle">観測 / 操作</text>

<!-- external signals -->
<rect x="14" y="92" width="124" height="116" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
<text class="bt" x="76" y="114" fill="#444441" text-anchor="middle">外部シグナル</text>
<text class="bs" x="76" y="138" fill="#5F5E5A" text-anchor="middle">GitHub</text>
<text class="bs" x="76" y="160" fill="#5F5E5A" text-anchor="middle">Product Hunt・Devpost</text>
<text class="bs" x="76" y="182" fill="#5F5E5A" text-anchor="middle">AI各社リリース情報</text>

<!-- human -->
<rect x="14" y="250" width="124" height="54" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
<text class="bt" x="76" y="274" fill="#444441" text-anchor="middle">人間</text>
<text class="bs" x="76" y="291" fill="#5F5E5A" text-anchor="middle">閲覧・承認 / 保留 / 停止</text>

<!-- cloud sql -->
<rect x="172" y="110" width="152" height="48" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="bt" x="248" y="131" fill="#085041" text-anchor="middle">Cloud SQL</text>
<text class="bs" x="248" y="147" fill="#0F6E56" text-anchor="middle">データ層 / 成果物</text>

<!-- cloud storage -->
<rect x="172" y="176" width="152" height="46" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.6"/>
<text class="bt" x="248" y="197" fill="#085041" text-anchor="middle">Cloud Storage</text>
<text class="bs" x="248" y="213" fill="#0F6E56" text-anchor="middle">成果物アセット</text>

<!-- cloud run jobs -->
<rect x="360" y="92" width="172" height="56" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text class="bt" x="446" y="116" fill="#3C3489" text-anchor="middle">Cloud Run Jobs</text>
<text class="bs" x="446" y="133" fill="#534AB7" text-anchor="middle">AI生成パイプライン</text>

<!-- cloud scheduler -->
<rect x="360" y="172" width="150" height="46" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text class="bt" x="435" y="193" fill="#3C3489" text-anchor="middle">Cloud Scheduler</text>
<text class="bs" x="435" y="209" fill="#534AB7" text-anchor="middle">定期起動</text>

<!-- cloud run web -->
<rect x="360" y="250" width="182" height="52" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.6"/>
<text class="bt" x="451" y="273" fill="#3C3489" text-anchor="middle">Cloud Run / Next.js</text>
<text class="bs" x="451" y="290" fill="#534AB7" text-anchor="middle">公開・観測アプリ</text>

<!-- ci/cd -->
<rect x="172" y="312" width="370" height="30" rx="6" fill="#F1EFE8" stroke="#888780" stroke-width="0.6"/>
<text class="bs" x="357" y="331" fill="#444441" text-anchor="middle">CI/CD ― GitHub Actions / Cloud Build / Artifact Registry</text>

<!-- gemini -->
<rect x="584" y="92" width="90" height="56" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.6"/>
<text class="bt" x="629" y="116" fill="#712B13" text-anchor="middle">Gemini API</text>
<text class="bs" x="629" y="133" fill="#993C1D" text-anchor="middle">生成モデル</text>

<text class="foot" x="16" y="366" fill="#6E6E68">※ 生成モデルは現状 Gemini API。将来 Vertex AI へ移行予定。</text>
</svg>
